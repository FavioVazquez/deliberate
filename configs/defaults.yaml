# deliberate -- Default model tier mappings
#
# Agents specify their preferred tier (high or mid) in their frontmatter.
# This file maps those tiers to actual models per provider.
#
# To override: copy provider-model-slots.example.yaml to
# provider-model-slots.yaml and customize.

tiers:
  anthropic:
    high: opus      # Claude Code shorthand — resolves to claude-opus-4-6
    mid: sonnet     # Claude Code shorthand — resolves to claude-sonnet-4-6
    # Opus is used for high-tier agents by default.
    # At startup, the coordinator asks the user whether to keep opus (high)
    # or switch all agents to sonnet. The user's choice overrides this mapping
    # for the session. See SKILL.md Step 0.5 for the selection prompt.

  openai:
    high: gpt-5.4
    mid: gpt-5.4-mini

  google:
    high: gemini-2.5-pro
    mid: gemini-2.5-flash
    # NOTE: gemini-3.1-pro and gemini-3-flash are available as previews.
    # Switch to them once they reach stable status.

  ollama:
    high: qwen3-coder
    mid: llama3.3:70b

# Platform defaults
platforms:
  claude-code:
    execution: parallel
    default_profile: full
    subagents: true

  windsurf:
    execution: sequential
    default_profile: lean
    subagents: false

  cursor:
    execution: sequential
    default_profile: lean
    subagents: false

# Output configuration
output:
  directory: deliberations
  format: markdown
  include_raw_rounds: true
  include_enforcement_notes: true
